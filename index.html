<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OAS Activity Assay Analyzer</title>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (JSX transpilation in browser) -->
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

  <!-- SheetJS (XLSX) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Recharts UMD (bundles its own d3 dependencies) -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F3F0FA; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ── Destructure globals exposed by CDN UMD builds ──────────────────────
    const { useState, useMemo } = React;
    const {
      LineChart, Line, XAxis, YAxis, CartesianGrid,
      Tooltip, Legend, ErrorBar, ResponsiveContainer
    } = Recharts;

    // ── Constants ──────────────────────────────────────────────────────────
    const PALETTE = ["#7C6FAF","#A78BCC","#5B8DB8","#6BBFA3","#C9A96E","#C97B7B","#7BAF8E","#B07BAF"];
    const DEFAULT_TIMEPOINTS = [0,5,10,20,40,60,80,100,120];
    const ROWS = ["A","B","C","D","E","F","G","H"];

    // ── Helpers ────────────────────────────────────────────────────────────
    const toNum = (v) => { if(v===null||v===undefined||v==="") return NaN; if(typeof v==="number") return v; return parseFloat(String(v).replace(",",".")); };
    const mean  = (arr) => arr.reduce((a,b)=>a+b,0)/arr.length;
    const stdDev = (arr) => { if(arr.length<2) return 0; const m=mean(arr); return Math.sqrt(arr.reduce((a,b)=>a+(b-m)*(b-m),0)/(arr.length-1)); };

    // ── Curve fitting (Levenberg-Marquardt) ────────────────────────────────
    function fitExpAssoc(tps, vals) {
      const valid = [];
      for (let i=0;i<tps.length;i++) { if(isFinite(vals[i])&&isFinite(tps[i])) valid.push({t:tps[i],y:vals[i]}); }
      if (valid.length<4) return {error:"Only "+valid.length+" valid point(s) - minimum 4 required"};
      function mdl(t,A,k) { return A*(1-Math.exp(-k*t)); }
      function sse(A,k) { let s=0; for(let i=0;i<valid.length;i++){const r=valid[i].y-mdl(valid[i].t,A,k);s+=r*r;} return s; }
      const maxY = Math.max.apply(null, valid.map((p)=>p.y));
      const inits = [[maxY>0?maxY:0.5,0.05],[maxY>0?maxY*1.5:1,0.02],[maxY>0?maxY*0.8:0.3,0.1],[0.5,0.03],[1.0,0.01]];
      let best = null;
      for (let _i=0;_i<inits.length;_i++) {
        let A=inits[_i][0], k=Math.max(inits[_i][1],1e-5), lambda=0.01, prevSSE=sse(A,k);
        for (let iter=0;iter<3000;iter++) {
          let j00=0,j01=0,j11=0,jt0=0,jt1=0;
          for (let i=0;i<valid.length;i++) {
            const e=Math.exp(-k*valid[i].t);
            const j0=1-e, j1=A*valid[i].t*e, r=valid[i].y-mdl(valid[i].t,A,k);
            j00+=j0*j0; j01+=j0*j1; j11+=j1*j1; jt0+=j0*r; jt1+=j1*r;
          }
          j00+=lambda; j11+=lambda;
          const det=j00*j11-j01*j01;
          if(Math.abs(det)<1e-15) break;
          const dA=(j11*jt0-j01*jt1)/det, dk=(j00*jt1-j01*jt0)/det;
          const nA=A+dA, nK=Math.max(1e-6,k+dk), nSSE=sse(nA,nK);
          if(nSSE<prevSSE){A=nA;k=nK;prevSSE=nSSE;lambda=Math.max(lambda/10,1e-10);}
          else lambda=Math.min(lambda*10,1e8);
          if(Math.abs(dA)<1e-9&&Math.abs(dk)<1e-11) break;
        }
        if(!best||sse(A,k)<sse(best.Amax,best.k)) best={Amax:A,k:k};
      }
      const Amax=best.Amax, k=best.k;
      const ym=valid.reduce((s,p)=>s+p.y,0)/valid.length;
      const ssTot=valid.reduce((s,p)=>s+(p.y-ym)*(p.y-ym),0);
      const ssRes=sse(Amax,k);
      const r2=ssTot>1e-12?Math.max(0,1-ssRes/ssTot):NaN;
      return {Amax:Amax,k:k,tHalf:Math.log(2)/k,r2:r2,rmse:Math.sqrt(ssRes/valid.length),n:valid.length};
    }

    // ── Styles ─────────────────────────────────────────────────────────────
    const S = {
      app:  { minHeight:"100vh", background:"#F3F0FA", fontFamily:"'Segoe UI',system-ui,sans-serif", color:"#2d2540", padding:"24px" },
      card: { background:"#fff", borderRadius:"12px", border:"1px solid #DDD6F0", padding:"24px", marginBottom:"20px", boxShadow:"0 2px 8px rgba(120,100,180,0.07)" },
      h1:   { fontSize:"22px", fontWeight:700, color:"#5B4A8A", marginBottom:"4px" },
      h2:   { fontSize:"16px", fontWeight:600, color:"#7C6FAF", marginBottom:"16px" },
      lbl:  { fontSize:"13px", color:"#6b5f8a", fontWeight:500, display:"block", marginBottom:"4px" },
      inp:  { width:"100%", padding:"8px 10px", borderRadius:"8px", border:"1px solid #C8BDE8", fontSize:"13px", outline:"none", boxSizing:"border-box", background:"#FDFBFF" },
      btn:  { padding:"9px 18px", borderRadius:"8px", border:"none", cursor:"pointer", fontSize:"13px", fontWeight:600 },
      btnP: { background:"#7C6FAF", color:"#fff" },
      btnS: { background:"#EDE9F8", color:"#5B4A8A" },
      tbl:  { width:"100%", borderCollapse:"collapse", fontSize:"13px" },
      th:   { background:"#EDE9F8", padding:"8px 10px", textAlign:"left", color:"#5B4A8A", fontWeight:600, borderBottom:"2px solid #C8BDE8" },
      td:   { padding:"7px 10px", borderBottom:"1px solid #F0ECF9" },
      tag:  { display:"inline-block", padding:"2px 8px", borderRadius:"12px", fontSize:"11px", background:"#EDE9F8", color:"#7C6FAF" },
      row:  { display:"flex", gap:"16px", flexWrap:"wrap" },
      col:  { flex:1, minWidth:"200px" },
      tabs: { display:"flex", gap:"8px", marginBottom:"16px", flexWrap:"wrap" },
      tab:  (a) => ({ padding:"7px 16px", borderRadius:"8px", border:"none", cursor:"pointer", fontSize:"13px", fontWeight:600, background:a?"#7C6FAF":"#EDE9F8", color:a?"#fff":"#5B4A8A" }),
      bdg:  { display:"inline-block", background:"#7C6FAF", color:"#fff", borderRadius:"99px", padding:"1px 8px", fontSize:"11px", marginLeft:"6px" },
      err:  { background:"#FFF0F0", border:"1px solid #F5C0C0", borderRadius:"8px", padding:"10px 14px", color:"#b03030", fontSize:"13px" },
    };

    // ── Main App ───────────────────────────────────────────────────────────
    function App() {
      const [step,setStep]       = useState(0);
      const [files,setFiles]     = useState([]);
      const [pErrs,setPErrs]     = useState([]);
      const [expName,setExpName] = useState("");
      const [expDate,setExpDate] = useState("");
      const [assayType,setAssayType] = useState("OAS activity (A580)");
      const [notes,setNotes]     = useState("");
      const [tpStr,setTpStr]     = useState(DEFAULT_TIMEPOINTS.join(", "));
      const [mappings,setMappings] = useState([]);
      const [chartMode,setChartMode] = useState("corrected");
      const [showSD,setShowSD]   = useState(true);
      const [hidden,setHidden]   = useState({});
      const [colors,setColors]   = useState({});
      const [activeTab,setActiveTab] = useState("chart");
      const [modal,setModal]     = useState(null);
      const [showFit,setShowFit] = useState(true);

      const parseExcel = (file) => new Promise((resolve,reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const wb=XLSX.read(e.target.result,{type:"array"});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
            let hr=-1,hc=-1;
            for(let r=0;r<data.length;r++){for(let c=0;c<(data[r]||[]).length;c++){if(String(data[r][c]).trim()==="<>"){hr=r;hc=c;break;}}if(hr>=0)break;}
            if(hr<0){reject("No '<>' cell in "+file.name);return;}
            const raw8x9=[];
            for(let ri=0;ri<8;ri++){const row=data[hr+1+ri]||[];raw8x9.push(Array.from({length:9},(_,ci)=>toNum(row[hc+1+ci])));}
            resolve({name:file.name,raw8x9:raw8x9});
          } catch(err){reject(String(err));}
        };
        reader.readAsArrayBuffer(file);
      });

      const handleFiles = async (e) => {
        const sel=Array.from(e.target.files), parsed=[], errs=[];
        for(const f of sel){try{parsed.push(await parseExcel(f));}catch(err){errs.push(err);}}
        setFiles(parsed); setPErrs(errs);
        if(parsed.length>0){
          const m=[];
          parsed.forEach((f,fi)=>ROWS.forEach((_,ri)=>m.push({fileIdx:fi,rowIdx:ri,rowLabel:ROWS[ri],condName:"",approach:"",rowNotes:""})));
          setMappings(m); setStep(1);
        }
      };

      const getParsedTPs = () => tpStr.split(/[,;\s]+/).map((s)=>parseFloat(s.replace(",","."))).filter((x)=>!isNaN(x));

      const analysisData = useMemo(() => {
        if(!files.length||!mappings.length) return null;
        const tps=getParsedTPs(), n=tps.length;
        const rows=mappings.filter((m)=>m.condName.trim()).map((m)=>{
          const raw=files[m.fileIdx].raw8x9[m.rowIdx].slice(0,n);
          const base=toNum(raw[0]);
          return Object.assign({},m,{raw:raw,corrected:raw.map((v)=>toNum(v)-base),cond:m.condName.trim()});
        });
        const conditions=[...new Set(rows.map((r)=>r.cond))];
        const condMap={};
        conditions.forEach((c)=>{
          const reps=rows.filter((r)=>r.cond===c);
          const repMeans=tps.map((_,ti)=>{const v=reps.map((r)=>r.corrected[ti]).filter((v)=>!isNaN(v));return v.length?mean(v):NaN;});
          const repSDs=tps.map((_,ti)=>{const v=reps.map((r)=>r.corrected[ti]).filter((v)=>!isNaN(v));return v.length>=2?stdDev(v):0;});
          condMap[c]={reps:reps,repMeans:repMeans,repSDs:repSDs,n:reps.length};
        });
        return {tps:tps,rows:rows,conditions:conditions,condMap:condMap};
      },[files,mappings,tpStr]);

      const chartData = useMemo(() => {
        if(!analysisData) return [];
        const {tps,conditions,condMap}=analysisData;
        return tps.map((t,ti)=>{
          const pt={t:t};
          conditions.forEach((c)=>{
            if(chartMode==="mean"){pt[c]=condMap[c].repMeans[ti];pt[c+"_sd"]=condMap[c].repSDs[ti];}
            else{condMap[c].reps.forEach((r,ri)=>{const key=condMap[c].n>1?c+" (rep "+(ri+1)+")":c;pt[key]=chartMode==="raw"?r.raw[ti]:r.corrected[ti];});}
          });
          return pt;
        });
      },[analysisData,chartMode]);

      const chartLines = useMemo(() => {
        if(!analysisData) return [];
        const {conditions,condMap}=analysisData;
        const lines=[];
        conditions.forEach((c,ci)=>{
          const color=colors[c]||PALETTE[ci%PALETTE.length];
          if(chartMode==="mean"){lines.push({key:c,label:c,color:color,hasSD:showSD&&condMap[c].n>1,parentCond:c});}
          else{condMap[c].reps.forEach((_,ri)=>{const key=condMap[c].n>1?c+" (rep "+(ri+1)+")":c;lines.push({key:key,label:key,color:color,parentCond:c});});}
        });
        return lines;
      },[analysisData,chartMode,showSD,colors]);

      const isHidden = (l) => hidden[l.parentCond||l.key]||false;

      const fitResults = useMemo(() => {
        if(!analysisData) return {};
        const {tps,conditions,condMap}=analysisData, res={};
        conditions.forEach((c)=>{res[c]=fitExpAssoc(tps,condMap[c].repMeans);});
        return res;
      },[analysisData]);

      const fitChartData = useMemo(() => {
        if(!analysisData) return [];
        const {tps,conditions,condMap}=analysisData;
        const maxT=Math.max.apply(null,tps);
        const fitTs=Array.from({length:61},(_,i)=>+(i*maxT/60).toFixed(2));
        const allTs=[...new Set(fitTs.concat(tps))].sort((a,b)=>a-b);
        return allTs.map((t)=>{
          const pt={t:t};
          const iAct=tps.findIndex((tp)=>Math.abs(tp-t)<0.01);
          conditions.forEach((c)=>{
            const fr=fitResults[c];
            if(fr&&!fr.error) pt[c+"_fit"]=+(fr.Amax*(1-Math.exp(-fr.k*t))).toFixed(5);
            if(iAct>=0){const mv=condMap[c].repMeans[iAct];if(!isNaN(mv)) pt[c+"_meas"]=mv;}
          });
          return pt;
        });
      },[analysisData,fitResults]);

      // ── SVG export helpers ───────────────────────────────────────────────
      function buildAxes(s,W,H,mg,pW,pH,tps,minX,maxX,minY,maxY,xs,ys,fmt) {
        for(let i=0;i<=6;i++){
          const val=minY+(maxY-minY)*i/6, y=ys(val).toFixed(1);
          s+='<line x1="'+mg.left+'" y1="'+y+'" x2="'+(W-mg.right)+'" y2="'+y+'" stroke="#EBEBF5" stroke-width="1"/>';
          s+='<text x="'+(mg.left-10)+'" y="'+(+y+4).toFixed(1)+'" text-anchor="end" font-size="11" font-family="Arial,sans-serif" fill="#555">'+fmt(val)+'</text>';
        }
        tps.forEach((t)=>{
          const x=xs(t).toFixed(1);
          s+='<line x1="'+x+'" y1="'+mg.top+'" x2="'+x+'" y2="'+(mg.top+pH)+'" stroke="#EBEBF5" stroke-width="1"/>';
          s+='<text x="'+x+'" y="'+(mg.top+pH+20)+'" text-anchor="middle" font-size="11" font-family="Arial,sans-serif" fill="#555">'+t+'</text>';
        });
        s+='<line x1="'+mg.left+'" y1="'+mg.top+'" x2="'+mg.left+'" y2="'+(mg.top+pH)+'" stroke="#888" stroke-width="1.5"/>';
        s+='<line x1="'+mg.left+'" y1="'+(mg.top+pH)+'" x2="'+(W-mg.right)+'" y2="'+(mg.top+pH)+'" stroke="#888" stroke-width="1.5"/>';
        const xLX=((mg.left+W-mg.right)/2).toFixed(1);
        s+='<text x="'+xLX+'" y="'+(H-4)+'" text-anchor="middle" font-size="13" font-family="Arial,sans-serif" fill="#333">Time (min)</text>';
        const yLY=((mg.top+mg.top+pH)/2).toFixed(1);
        s+='<text x="16" y="'+yLY+'" text-anchor="middle" font-size="13" font-family="Arial,sans-serif" fill="#333" transform="rotate(-90 16 '+yLY+')">Absorbance at 580 nm</text>';
        return s;
      }

      function makeLegendRect(s,lx,mg,legendW,legendH) {
        return s+'<rect x="'+(lx-6)+'" y="'+(mg.top+6)+'" width="'+legendW+'" height="'+legendH+'" fill="white" stroke="#DDD6F0" stroke-width="1" rx="5"/>';
      }

      const generateSVG = () => {
        if(!analysisData) return null;
        const {tps}=analysisData;
        const W=900,H=520,mg={top:40,right:40,bottom:70,left:90};
        const pW=W-mg.left-mg.right, pH=H-mg.top-mg.bottom;
        const visLines=chartLines.filter((l)=>!isHidden(l));
        const allVals=[];
        chartData.forEach((pt)=>visLines.forEach((l)=>{
          const v=pt[l.key];
          if(typeof v==="number"&&!isNaN(v)){allVals.push(v);if(l.hasSD&&pt[l.key+"_sd"]){allVals.push(v+pt[l.key+"_sd"]);allVals.push(v-pt[l.key+"_sd"]);}}
        }));
        const minX=Math.min.apply(null,tps), maxX=Math.max.apply(null,tps);
        const rawMax=allVals.length?Math.max.apply(null,allVals):1;
        const pad=(rawMax)*0.12||0.05, minY=0, maxY=rawMax+pad;
        const xs=(v)=>mg.left+(v-minX)/(maxX-minX||1)*pW;
        const ys=(v)=>mg.top+pH-(v-minY)/(maxY-minY||1)*pH;
        const fmt=(n)=>Math.abs(n)<0.001&&n!==0?n.toExponential(2):n.toFixed(3);
        let s='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><rect width="100%" height="100%" fill="white"/>';
        s=buildAxes(s,W,H,mg,pW,pH,tps,minX,maxX,minY,maxY,xs,ys,fmt);
        visLines.forEach((l)=>{
          const pts=chartData.map((pt)=>({x:xs(pt.t),y:ys(pt[l.key]),val:pt[l.key],sd:pt[l.key+"_sd"]||0})).filter((p)=>typeof p.val==="number"&&!isNaN(p.val));
          if(!pts.length) return;
          if(l.hasSD){
            const cap=6;
            pts.forEach((p)=>{
              if(!p.sd) return;
              const yT=ys(p.val+p.sd).toFixed(1), yB=ys(p.val-p.sd).toFixed(1);
              s+='<line x1="'+p.x.toFixed(1)+'" y1="'+yT+'" x2="'+p.x.toFixed(1)+'" y2="'+yB+'" stroke="'+l.color+'" stroke-width="1.5"/>';
              s+='<line x1="'+(p.x-cap).toFixed(1)+'" y1="'+yT+'" x2="'+(p.x+cap).toFixed(1)+'" y2="'+yT+'" stroke="'+l.color+'" stroke-width="1.5"/>';
              s+='<line x1="'+(p.x-cap).toFixed(1)+'" y1="'+yB+'" x2="'+(p.x+cap).toFixed(1)+'" y2="'+yB+'" stroke="'+l.color+'" stroke-width="1.5"/>';
            });
          }
          s+='<path d="'+pts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ")+'" fill="none" stroke="'+l.color+'" stroke-width="2.2"/>';
          pts.forEach((p)=>{s+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4" fill="'+l.color+'" stroke="white" stroke-width="1"/>';});
        });
        const lx=mg.left+16, liH=22;
        const longestL=visLines.reduce((a,b)=>b.label.length>a.length?b.label:a,"");
        const legendW=Math.round(longestL.length*6.5)+46, legendH=visLines.length*liH+10;
        s=makeLegendRect(s,lx,mg,legendW,legendH);
        visLines.forEach((l,i)=>{
          const ly=mg.top+22+i*liH;
          s+='<line x1="'+lx+'" y1="'+ly+'" x2="'+(lx+22)+'" y2="'+ly+'" stroke="'+l.color+'" stroke-width="2.2"/>';
          s+='<circle cx="'+(lx+11)+'" cy="'+ly+'" r="4" fill="'+l.color+'" stroke="white" stroke-width="1"/>';
          s+='<text x="'+(lx+30)+'" y="'+(ly+4)+'" font-size="12" font-family="Arial,sans-serif" fill="#333">'+l.label+'</text>';
        });
        s+='</svg>';
        return s;
      };

      const generateFitSVG = () => {
        if(!analysisData) return null;
        const {tps,conditions,condMap}=analysisData;
        const W=900,H=520,mg={top:40,right:40,bottom:70,left:90};
        const pW=W-mg.left-mg.right, pH=H-mg.top-mg.bottom;
        const visC=conditions.filter((c)=>!hidden[c]);
        const maxT=Math.max.apply(null,tps);
        const allVals=[];
        conditions.forEach((c)=>{condMap[c].repMeans.forEach((v)=>{if(!isNaN(v))allVals.push(v);});});
        const minX=0, maxX=maxT;
        const rawMax=allVals.length?Math.max.apply(null,allVals):1;
        const pad=(rawMax)*0.12||0.05, minY=0, maxY=rawMax+pad;
        const xs=(v)=>mg.left+(v-minX)/(maxX-minX||1)*pW;
        const ys=(v)=>mg.top+pH-(v-minY)/(maxY-minY||1)*pH;
        const fmt=(n)=>Math.abs(n)<0.001&&n!==0?n.toExponential(2):n.toFixed(3);
        let s='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><rect width="100%" height="100%" fill="white"/>';
        s=buildAxes(s,W,H,mg,pW,pH,tps,minX,maxX,minY,maxY,xs,ys,fmt);
        conditions.forEach((c,ci)=>{
          if(hidden[c]) return;
          const color=colors[c]||PALETTE[ci%PALETTE.length];
          const fr=fitResults[c];
          tps.forEach((t,ti)=>{
            const mv=condMap[c].repMeans[ti], sd=condMap[c].repSDs[ti];
            if(isNaN(mv)) return;
            const px=xs(t), py=ys(mv);
            if(condMap[c].n>1&&sd>0){
              const yT=ys(mv+sd).toFixed(1), yB=ys(mv-sd).toFixed(1), cap=5;
              s+='<line x1="'+px.toFixed(1)+'" y1="'+yT+'" x2="'+px.toFixed(1)+'" y2="'+yB+'" stroke="'+color+'" stroke-width="1.5"/>';
              s+='<line x1="'+(px-cap).toFixed(1)+'" y1="'+yT+'" x2="'+(px+cap).toFixed(1)+'" y2="'+yT+'" stroke="'+color+'" stroke-width="1.5"/>';
              s+='<line x1="'+(px-cap).toFixed(1)+'" y1="'+yB+'" x2="'+(px+cap).toFixed(1)+'" y2="'+yB+'" stroke="'+color+'" stroke-width="1.5"/>';
            }
          });
          const mPts=tps.map((t,ti)=>({x:xs(t),y:ys(condMap[c].repMeans[ti]),v:condMap[c].repMeans[ti]})).filter((p)=>!isNaN(p.v));
          if(mPts.length>1) s+='<path d="'+mPts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ")+'" fill="none" stroke="'+color+'" stroke-width="1.8" opacity="0.5"/>';
          mPts.forEach((p)=>{s+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4.5" fill="'+color+'" stroke="white" stroke-width="1.2"/>';});
          if(fr&&!fr.error&&showFit){
            const nPts=80;
            const fitPts=Array.from({length:nPts+1},function(_,i){const t=i*maxT/nPts;return {x:xs(t),y:ys(fr.Amax*(1-Math.exp(-fr.k*t)))};});
            s+='<path d="'+fitPts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ")+'" fill="none" stroke="'+color+'" stroke-width="2.2" stroke-dasharray="8 4"/>';
          }
        });
        const lx=mg.left+16, liH=22;
        const longestC=visC.reduce((a,b)=>b.length>a.length?b:a,"");
        const legendW=Math.round(longestC.length*5.8)+46, legendH=visC.length*liH+10;
        s=makeLegendRect(s,lx,mg,legendW,legendH);
        visC.forEach((c,i)=>{
          const color=colors[c]||PALETTE[conditions.indexOf(c)%PALETTE.length], ly=mg.top+22+i*liH;
          s+='<line x1="'+lx+'" y1="'+ly+'" x2="'+(lx+12)+'" y2="'+ly+'" stroke="'+color+'" stroke-width="2.2"/>';
          s+='<line x1="'+(lx+12)+'" y1="'+ly+'" x2="'+(lx+22)+'" y2="'+ly+'" stroke="'+color+'" stroke-width="2" stroke-dasharray="4 3"/>';
          s+='<circle cx="'+(lx+5)+'" cy="'+ly+'" r="4" fill="'+color+'" stroke="white" stroke-width="1"/>';
          s+='<text x="'+(lx+30)+'" y="'+(ly+4)+'" font-size="12" font-family="Arial,sans-serif" fill="#333">'+c+'</text>';
        });
        s+='</svg>';
        return s;
      };

      const exportImg = (svgFn, fname) => {
        if(!analysisData){setModal({type:"error",msg:"No data."});return;}
        try{const sv=svgFn();const b64=btoa(unescape(encodeURIComponent(sv)));setModal({type:"image",url:"data:image/svg+xml;base64,"+b64,filename:fname});}
        catch(e){setModal({type:"error",msg:String(e)});}
      };

      const exportCSV = (type) => {
        if(!analysisData) return;
        const {tps,rows,conditions,condMap}=analysisData;
        let csv="";
        if(type==="raw"){csv=["Condition","File","Row","Approach"].concat(tps.map((t)=>"t="+t+"min")).join(",")+"\n";rows.forEach((r)=>{csv+=[r.cond,files[r.fileIdx].name,r.rowLabel,r.approach].concat(r.raw.map((v)=>isNaN(v)?"":v)).join(",")+"\n";});}
        else if(type==="corrected"){csv=["Condition","File","Row","Approach"].concat(tps.map((t)=>"t="+t+"min")).join(",")+"\n";rows.forEach((r)=>{csv+=[r.cond,files[r.fileIdx].name,r.rowLabel,r.approach].concat(r.corrected.map((v)=>isNaN(v)?"":v.toFixed(4))).join(",")+"\n";});}
        else if(type==="summary"){csv=["Condition","n"].concat(tps.reduce((a,t)=>a.concat(["mean_t="+t,"sd_t="+t]),[])).join(",")+"\n";conditions.forEach((c)=>{const d=condMap[c];csv+=[c,d.n].concat(tps.reduce((a,_,ti)=>a.concat([isNaN(d.repMeans[ti])?"":d.repMeans[ti].toFixed(4),d.repSDs[ti].toFixed(4)]),[],)).join(",")+"\n";});}
        else{csv="Condition,Equation,Amax,k (min-1),t_half (min),R2,RMSE,N,Status\n";conditions.forEach((c)=>{const fr=fitResults[c];if(!fr){csv+='"'+c+'",,,,,,,,No result\n';return;}if(fr.error){csv+='"'+c+'","A(t)=Amax*(1-exp(-k*t))",,,,,,,"'+fr.error+'"\n';return;}csv+='"'+c+'","A(t)=Amax*(1-exp(-k*t))",'+fr.Amax.toFixed(5)+","+fr.k.toFixed(6)+","+fr.tHalf.toFixed(3)+","+fr.r2.toFixed(4)+","+fr.rmse.toFixed(6)+","+fr.n+",OK\n";});}
        const b64=btoa(unescape(encodeURIComponent(csv)));
        setModal({type:"download",url:"data:text/csv;base64,"+b64,filename:type+"_data.csv"});
      };

      const updMap = (idx,key,val) => setMappings((prev)=>{const m=[...prev];m[idx]=Object.assign({},m[idx],{[key]:val});return m;});

      // ── PasteImport sub-component ────────────────────────────────────────
      const PasteImport = ({fi}) => {
        const [raw,setRaw]=useState(""); const [preview,setPreview]=useState([]); const [rev,setRev]=useState(true); const [msg,setMsg]=useState("");
        const parse=(text)=>text.trim().split(/\r?\n/).map((l)=>l.split("\t").map((s)=>s.trim()).filter(Boolean)).reduce((a,b)=>a.concat(b),[]).filter(Boolean).slice(0,8);
        const onChg=(text)=>{setRaw(text);const n=parse(text);setPreview(n);setMsg(n.length?n.length+" name(s) detected.":"No names detected.");};
        const apply=()=>{
          const ordered=rev?[...preview].reverse():preview;
          setMappings((prev)=>{const m=[...prev];ordered.forEach((name,i)=>{const idx=m.findIndex((x)=>x.fileIdx===fi&&x.rowIdx===i);if(idx>=0&&name)m[idx]=Object.assign({},m[idx],{condName:name});});return m;});
          setMsg("Applied!"); setRaw(""); setPreview([]);
        };
        return (
          <div style={{background:"#F3F0FA",borderRadius:"10px",padding:"14px 16px",marginBottom:"14px",border:"1px dashed #C8BDE8"}}>
            <div style={{fontSize:"13px",fontWeight:600,color:"#7C6FAF",marginBottom:"4px"}}>Paste condition names from Excel</div>
            <textarea style={Object.assign({},S.inp,{minHeight:"48px",resize:"vertical",fontSize:"12px",fontFamily:"monospace"})} placeholder="Paste here..." value={raw} onChange={(e)=>onChg(e.target.value)}/>
            {preview.length>0&&(<div style={{marginTop:"8px"}}>
              <div style={{display:"flex",gap:"16px",alignItems:"center",marginBottom:"6px",flexWrap:"wrap"}}>
                <span style={{fontSize:"12px",color:"#5B4A8A",fontWeight:600}}>Preview:</span>
                <label style={{fontSize:"12px",color:"#5B4A8A",cursor:"pointer",display:"flex",alignItems:"center",gap:"4px"}}><input type="radio" checked={!rev} onChange={()=>setRev(false)}/> 1st to A</label>
                <label style={{fontSize:"12px",color:"#5B4A8A",cursor:"pointer",display:"flex",alignItems:"center",gap:"4px"}}><input type="radio" checked={rev} onChange={()=>setRev(true)}/> 1st to H</label>
              </div>
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                {(rev?[...preview].reverse():preview).map((name,i)=>(<span key={i} style={{padding:"3px 10px",borderRadius:"12px",background:"#fff",border:"1px solid #C8BDE8",fontSize:"12px"}}><span style={{color:"#aaa"}}>{ROWS[i]}: </span>{name}</span>))}
              </div>
              <button style={Object.assign({},S.btn,S.btnP,{marginTop:"10px",fontSize:"12px",padding:"6px 14px"})} onClick={apply}>Apply</button>
            </div>)}
            {msg&&<div style={{fontSize:"12px",color:msg.startsWith("Applied")?"#5B8A5B":"#7C6FAF",marginTop:"6px"}}>{msg}</div>}
          </div>
        );
      };

      // ── Derived values used in JSX ────────────────────────────────────────
      const tps=getParsedTPs();
      const conditions=analysisData?analysisData.conditions:[];
      const condMap=analysisData?analysisData.condMap:{};
      const rows=analysisData?analysisData.rows:[];

      // ── Render ────────────────────────────────────────────────────────────
      return (
        <div style={S.app}>
          <div style={{maxWidth:"1160px",margin:"0 auto"}}>
            <div style={{marginBottom:"20px"}}>
              <div style={S.h1}>OAS Activity Assay Analyzer</div>
              <div style={{fontSize:"12px",color:"#aaa"}}>96-Well Plate - Absorbance 580 nm - Baseline Correction - Replicate Analysis - Curve Fitting</div>
            </div>

            <div style={{display:"flex",gap:"8px",marginBottom:"20px",fontSize:"12px"}}>
              {["Upload","Metadata & Mapping","Analysis"].map((s,i)=>(
                <span key={i} style={{padding:"4px 12px",borderRadius:"20px",background:step===i?"#7C6FAF":step>i?"#C8BDE8":"#EDE9F8",color:step===i?"#fff":step>i?"#5B4A8A":"#aaa",fontWeight:step===i?600:400}}>{i+1}. {s}</span>
              ))}
            </div>

            {step===0&&(<div style={S.card}>
              <div style={S.h2}>Upload Excel Files</div>
              <p style={{fontSize:"13px",color:"#888",marginBottom:"16px"}}>Upload one or more 96-well plate Excel exports. The app auto-detects the result table via the "&lt;&gt;" cell.</p>
              <label style={Object.assign({},S.btn,S.btnP,{display:"inline-block",cursor:"pointer"})}>
                Select Files <input type="file" multiple accept=".xlsx,.xls" onChange={handleFiles} style={{display:"none"}}/>
              </label>
              {pErrs.map((e,i)=><div key={i} style={Object.assign({},S.err,{marginTop:"10px"})}>Warning: {e}</div>)}
            </div>)}

            {step===1&&(<>
              <div style={S.card}>
                <div style={S.h2}>Experiment Metadata</div>
                <div style={S.row}>
                  <div style={S.col}><label style={S.lbl}>Experiment Name</label><input style={S.inp} value={expName} onChange={(e)=>setExpName(e.target.value)} placeholder="e.g. OAS1 Assay #3"/></div>
                  <div style={S.col}><label style={S.lbl}>Date</label><input style={S.inp} type="date" value={expDate} onChange={(e)=>setExpDate(e.target.value)}/></div>
                  <div style={S.col}><label style={S.lbl}>Assay Type</label><input style={S.inp} value={assayType} onChange={(e)=>setAssayType(e.target.value)}/></div>
                </div>
                <div style={{marginTop:"14px"}}><label style={S.lbl}>Time Points in minutes (comma-separated)</label><input style={S.inp} value={tpStr} onChange={(e)=>setTpStr(e.target.value)} placeholder="0, 5, 10, 20, 40, 60, 80, 100, 120"/></div>
                <div style={{marginTop:"14px"}}><label style={S.lbl}>Notes</label><textarea style={Object.assign({},S.inp,{minHeight:"60px",resize:"vertical"})} value={notes} onChange={(e)=>setNotes(e.target.value)}/></div>
              </div>
              {files.map((f,fi)=>(<div key={fi} style={S.card}>
                <div style={S.h2}>File: <span style={{color:"#2d2540"}}>{f.name}</span></div>
                <PasteImport fi={fi}/>
                <table style={S.tbl}>
                  <thead><tr><th style={S.th}>Row</th><th style={S.th}>Condition Name</th><th style={S.th}>Approach</th><th style={S.th}>Notes</th></tr></thead>
                  <tbody>{ROWS.map((row,ri)=>{
                    const mIdx=mappings.findIndex((m)=>m.fileIdx===fi&&m.rowIdx===ri);
                    const m=mappings[mIdx];
                    return m?(<tr key={ri} style={{background:ri%2===0?"#FDFBFF":"#F8F5FD"}}>
                      <td style={S.td}><span style={S.tag}>{row}</span></td>
                      <td style={S.td}><input style={Object.assign({},S.inp,{width:"160px"})} value={m.condName} onChange={(e)=>updMap(mIdx,"condName",e.target.value)} placeholder="e.g. OAS1 + RNA"/></td>
                      <td style={S.td}><input style={Object.assign({},S.inp,{width:"140px"})} value={m.approach} onChange={(e)=>updMap(mIdx,"approach",e.target.value)}/></td>
                      <td style={S.td}><input style={S.inp} value={m.rowNotes} onChange={(e)=>updMap(mIdx,"rowNotes",e.target.value)} placeholder="optional"/></td>
                    </tr>):null;
                  })}</tbody>
                </table>
              </div>))}
              <div style={{display:"flex",gap:"12px"}}>
                <button style={Object.assign({},S.btn,S.btnS)} onClick={()=>setStep(0)}>Back</button>
                <button style={Object.assign({},S.btn,S.btnP)} onClick={()=>setStep(2)}>Start Analysis</button>
              </div>
            </>)}

            {step===2&&(<>
              <div style={S.card}>
                <div style={Object.assign({},S.h1,{marginBottom:"8px"})}>{expName||"Experiment"}</div>
                <div style={{fontSize:"13px",color:"#888",display:"flex",gap:"20px",flexWrap:"wrap"}}>
                  {expDate&&<span>{expDate}</span>}
                  <span>{assayType}</span><span>{files.length} file(s)</span>
                  <span>{conditions.length} conditions</span><span>{tps.length} time points</span>
                </div>
                {notes&&<div style={{marginTop:"8px",fontSize:"12px",color:"#aaa"}}>{notes}</div>}
              </div>

              <div style={S.tabs}>
                {[["chart","Chart"],["raw","Raw Data"],["corrected","Corrected"],["summary","Summary"],["fit","Curve Fit"]].map(([t,label])=>(
                  <button key={t} style={S.tab(activeTab===t)} onClick={()=>setActiveTab(t)}>{label}</button>
                ))}
                <button style={Object.assign({},S.btn,S.btnS,{marginLeft:"auto"})} onClick={()=>setStep(1)}>Edit Metadata</button>
              </div>

              {activeTab==="chart"&&(<div style={S.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px",flexWrap:"wrap",gap:"12px"}}>
                  <div style={{display:"flex",gap:"12px",flexWrap:"wrap",alignItems:"center"}}>
                    <div><label style={S.lbl}>Display Mode</label>
                      <select style={Object.assign({},S.inp,{width:"auto"})} value={chartMode} onChange={(e)=>setChartMode(e.target.value)}>
                        <option value="corrected">Baseline-corrected (individual)</option>
                        <option value="raw">Raw data (individual)</option>
                        <option value="mean">Replicate Mean +/- SD</option>
                      </select>
                    </div>
                    {chartMode==="mean"&&<div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"18px"}}>
                      <input type="checkbox" id="sd" checked={showSD} onChange={(e)=>setShowSD(e.target.checked)}/>
                      <label htmlFor="sd" style={{fontSize:"13px",color:"#5B4A8A"}}>Show SD</label>
                    </div>}
                  </div>
                  <button style={Object.assign({},S.btn,S.btnS,{marginTop:"18px"})} onClick={()=>exportImg(generateSVG,(expName||"assay")+"_chart")}>Download PNG</button>
                </div>
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}}>
                  {conditions.map((c,ci)=>{
                    const color=colors[c]||PALETTE[ci%PALETTE.length];
                    return(<div key={c} style={{display:"flex",alignItems:"center",gap:"6px",padding:"4px 10px",borderRadius:"20px",border:"2px solid "+color,background:hidden[c]?"#f8f8f8":"#fff",cursor:"pointer",opacity:hidden[c]?0.5:1}} onClick={()=>setHidden((p)=>Object.assign({},p,{[c]:!p[c]}))}>
                      <input type="color" value={color} style={{width:"16px",height:"16px",border:"none",cursor:"pointer",padding:0}} onClick={(e)=>e.stopPropagation()} onChange={(e)=>{e.stopPropagation();setColors((p)=>Object.assign({},p,{[c]:e.target.value}));}}/>
                      <span style={{fontSize:"12px",userSelect:"none"}}>{c}</span>
                      {condMap[c]&&condMap[c].n>1&&<span style={S.bdg}>n={condMap[c].n}</span>}
                    </div>);
                  })}
                </div>
                <ResponsiveContainer width="100%" height={380}>
                  <LineChart data={chartData} margin={{top:10,right:30,left:20,bottom:30}}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#EDE9F8"/>
                    <XAxis dataKey="t" label={{value:"Time (min)",position:"insideBottom",offset:-15,fontSize:13}} tick={{fontSize:11}}/>
                    <YAxis domain={[0,"auto"]} label={{value:"Absorbance at 580 nm",angle:-90,position:"insideLeft",offset:10,dy:-60,fontSize:12}} tick={{fontSize:11}}/>
                    <Tooltip contentStyle={{fontSize:"12px",borderRadius:"8px",border:"1px solid #DDD6F0"}} formatter={(v,n)=>[typeof v==="number"?v.toFixed(4):v,n]}/>
                    <Legend verticalAlign="top" align="left" wrapperStyle={{fontSize:"12px",paddingBottom:"8px"}}/>
                    {chartLines.map((l)=>{
                      if(isHidden(l)) return null;
                      const color=colors[l.parentCond]||PALETTE[conditions.indexOf(l.parentCond)%PALETTE.length];
                      return(<Line key={l.key} type="linear" dataKey={l.key} stroke={color} strokeWidth={chartMode==="mean"?2.5:1.8} dot={{r:3}} activeDot={{r:5}}>
                        {l.hasSD&&<ErrorBar dataKey={l.key+"_sd"} width={4} strokeWidth={1.5} stroke={color} opacity={0.6}/>}
                      </Line>);
                    })}
                  </LineChart>
                </ResponsiveContainer>
              </div>)}

              {activeTab==="raw"&&(<div style={S.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                  <div style={S.h2}>Raw Data (Absorbance)</div>
                  <button style={Object.assign({},S.btn,S.btnS)} onClick={()=>exportCSV("raw")}>Download CSV</button>
                </div>
                <div style={{overflowX:"auto"}}><table style={S.tbl}>
                  <thead><tr><th style={S.th}>Condition</th><th style={S.th}>File</th><th style={S.th}>Row</th>{tps.map((t)=><th key={t} style={S.th}>{t} min</th>)}</tr></thead>
                  <tbody>{rows.map((r,i)=>(<tr key={i} style={{background:i%2===0?"#FDFBFF":"#F8F5FD"}}>
                    <td style={S.td}><b>{r.cond}</b></td><td style={S.td}>{files[r.fileIdx].name}</td><td style={S.td}>{r.rowLabel}</td>
                    {r.raw.map((v,ti)=><td key={ti} style={S.td}>{isNaN(v)?"--":v.toFixed(4)}</td>)}
                  </tr>))}</tbody>
                </table></div>
              </div>)}

              {activeTab==="corrected"&&(<div style={S.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                  <div style={S.h2}>Baseline-Corrected Data</div>
                  <button style={Object.assign({},S.btn,S.btnS)} onClick={()=>exportCSV("corrected")}>Download CSV</button>
                </div>
                <div style={{overflowX:"auto"}}><table style={S.tbl}>
                  <thead><tr><th style={S.th}>Condition</th><th style={S.th}>File</th><th style={S.th}>Row</th>{tps.map((t)=><th key={t} style={S.th}>{t} min</th>)}</tr></thead>
                  <tbody>{rows.map((r,i)=>(<tr key={i} style={{background:i%2===0?"#FDFBFF":"#F8F5FD"}}>
                    <td style={S.td}><b>{r.cond}</b></td><td style={S.td}>{files[r.fileIdx].name}</td><td style={S.td}>{r.rowLabel}</td>
                    {r.corrected.map((v,ti)=><td key={ti} style={{padding:"7px 10px",borderBottom:"1px solid #F0ECF9",color:ti===0?"#ccc":"inherit"}}>{isNaN(v)?"--":v.toFixed(4)}</td>)}
                  </tr>))}</tbody>
                </table></div>
              </div>)}

              {activeTab==="summary"&&(<div style={S.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                  <div style={S.h2}>Replicate Summary (Mean +/- SD)</div>
                  <button style={Object.assign({},S.btn,S.btnS)} onClick={()=>exportCSV("summary")}>Download CSV</button>
                </div>
                <div style={{overflowX:"auto"}}><table style={S.tbl}>
                  <thead><tr><th style={S.th}>Condition</th><th style={S.th}>n</th>{tps.map((t)=><th key={t} style={Object.assign({},S.th,{minWidth:"110px"})}>{t} min</th>)}</tr></thead>
                  <tbody>{conditions.map((c,ci)=>{const d=condMap[c];return(<tr key={ci} style={{background:ci%2===0?"#FDFBFF":"#F8F5FD"}}>
                    <td style={S.td}><b>{c}</b></td><td style={S.td}>{d.n}</td>
                    {tps.map((_,ti)=>(<td key={ti} style={S.td}>{isNaN(d.repMeans[ti])?"--":<span>{d.repMeans[ti].toFixed(4)}{d.n>1&&<span style={{color:"#aaa",fontSize:"11px"}}> +/-{d.repSDs[ti].toFixed(4)}</span>}</span>}</td>))}
                  </tr>);})}</tbody>
                </table></div>
              </div>)}

              {activeTab==="fit"&&(<>
                <div style={Object.assign({},S.card,{borderLeft:"4px solid #7C6FAF"})}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"12px"}}>
                    <div>
                      <div style={S.h2}>Curve Fit Analysis</div>
                      <div style={{fontSize:"12px",color:"#888",marginBottom:"8px"}}>Model: A(t) = Amax x (1 - exp(-k x t)) fitted to replicate means via Levenberg-Marquardt.</div>
                    </div>
                    <div style={{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}}>
                      <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                        <input type="checkbox" id="showFit" checked={showFit} onChange={(e)=>setShowFit(e.target.checked)}/>
                        <label htmlFor="showFit" style={{fontSize:"13px",color:"#5B4A8A"}}>Show fitted curves</label>
                      </div>
                      <button style={Object.assign({},S.btn,S.btnS)} onClick={()=>exportImg(generateFitSVG,(expName||"assay")+"_fit_chart")}>Download PNG</button>
                    </div>
                  </div>
                  <div style={{display:"inline-block",width:"max-content",maxWidth:"max-content",padding:"6px 10px",background:"#fff",border:"1px solid #EDE9F8",borderRadius:"6px",marginBottom:"10px",boxSizing:"border-box"}}>
                    <div style={{display:"inline-flex",flexDirection:"column",alignItems:"flex-start",width:"max-content",gap:"4px"}}>
                      {conditions.filter((c)=>!hidden[c]).map((c,ci)=>{
                        const color=colors[c]||PALETTE[ci%PALETTE.length];
                        return(<div key={c} style={{display:"flex",alignItems:"center",gap:"6px",fontSize:"12px",color:"#333",whiteSpace:"nowrap"}}>
                          <svg width="28" height="12" style={{flexShrink:0,overflow:"visible"}}>
                            <line x1="0" y1="6" x2="14" y2="6" stroke={color} strokeWidth="2.2"/>
                            <circle cx="5" cy="6" r="3.5" fill={color}/>
                            <line x1="14" y1="6" x2="28" y2="6" stroke={color} strokeWidth="1.5" strokeDasharray="4 2"/>
                          </svg>
                          <span>{c}</span>
                        </div>);
                      })}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}}>
                    {conditions.map((c,ci)=>{
                      const color=colors[c]||PALETTE[ci%PALETTE.length];
                      return(<div key={c} style={{display:"flex",alignItems:"center",gap:"5px",padding:"4px 10px",borderRadius:"20px",border:"2px solid "+color,background:hidden[c]?"#f8f8f8":"#fff",cursor:"pointer",opacity:hidden[c]?0.45:1}} onClick={()=>setHidden((p)=>Object.assign({},p,{[c]:!p[c]}))}>
                        <div style={{width:"10px",height:"10px",borderRadius:"50%",background:color}}/>
                        <span style={{fontSize:"12px",userSelect:"none"}}>{c}</span>
                      </div>);
                    })}
                  </div>
                  <ResponsiveContainer width="100%" height={400}>
                    <LineChart data={fitChartData} margin={{top:5,right:30,left:20,bottom:30}}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#EDE9F8"/>
                      <XAxis dataKey="t" type="number" domain={["dataMin","dataMax"]} label={{value:"Time (min)",position:"insideBottom",offset:-15,fontSize:13}} tick={{fontSize:11}}/>
                      <YAxis domain={[0,"auto"]} label={{value:"Absorbance at 580 nm",angle:-90,position:"insideLeft",offset:10,dy:-60,fontSize:12}} tick={{fontSize:11}}/>
                      <Tooltip contentStyle={{fontSize:"11px",borderRadius:"8px",border:"1px solid #DDD6F0"}} formatter={(v,n)=>[typeof v==="number"?v.toFixed(4):v,n]} labelFormatter={(l)=>"t = "+(+l).toFixed(1)+" min"}/>
                      {conditions.map((c,ci)=>{
                        if(hidden[c]) return null;
                        const color=colors[c]||PALETTE[ci%PALETTE.length];
                        const fr=fitResults[c];
                        return [
                          <Line key={c+"_meas"} type="linear" dataKey={c+"_meas"} name={c} stroke={color} strokeWidth={1.8} dot={{r:4,fill:color}} activeDot={{r:6}} connectNulls={true} legendType="none"/>,
                          showFit&&fr&&!fr.error?<Line key={c+"_fit"} type="monotone" dataKey={c+"_fit"} stroke={color} strokeWidth={2} strokeDasharray="7 4" dot={false} activeDot={false} legendType="none"/>:null
                        ];
                      })}
                    </LineChart>
                  </ResponsiveContainer>
                </div>

                <div style={S.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <div style={S.h2}>Fit Parameters</div>
                    <button style={Object.assign({},S.btn,S.btnS)} onClick={()=>exportCSV("fit")}>Download CSV</button>
                  </div>
                  <div style={{overflowX:"auto"}}><table style={S.tbl}>
                    <thead><tr>
                      <th style={S.th}>Condition</th><th style={S.th}>Amax</th><th style={S.th}>k (min-1)</th>
                      <th style={S.th}>t1/2 (min)</th><th style={S.th}>R2</th><th style={S.th}>RMSE</th><th style={S.th}>n</th><th style={S.th}>Status</th>
                    </tr></thead>
                    <tbody>{conditions.map((c,ci)=>{
                      const fr=fitResults[c];
                      const color=colors[c]||PALETTE[ci%PALETTE.length];
                      if(!fr) return null;
                      const good=!fr.error&&fr.r2>=0.95, ok=!fr.error&&fr.r2>=0.85;
                      const sc=fr.error?"#b03030":good?"#3a7a3a":ok?"#8a6a1a":"#b03030";
                      const sl=fr.error?"Failed":good?"Good":ok?"Moderate":"Poor fit";
                      return(<tr key={ci} style={{background:ci%2===0?"#FDFBFF":"#F8F5FD"}}>
                        <td style={S.td}><span style={{display:"inline-block",width:"10px",height:"10px",borderRadius:"50%",background:color,marginRight:"6px",verticalAlign:"middle"}}/><b>{c}</b></td>
                        {fr.error?<td style={S.td} colSpan={6}><span style={{color:"#b03030",fontSize:"12px"}}>{fr.error}</span></td>:<>
                          <td style={S.td}>{fr.Amax.toFixed(4)}</td><td style={S.td}>{fr.k.toFixed(5)}</td>
                          <td style={S.td}>{fr.tHalf.toFixed(2)}</td><td style={S.td}><b style={{color:sc}}>{fr.r2.toFixed(4)}</b></td>
                          <td style={S.td}>{fr.rmse.toFixed(5)}</td><td style={S.td}>{fr.n}</td>
                        </>}
                        <td style={S.td}><span style={{color:sc,fontSize:"12px",fontWeight:600}}>{sl}</span></td>
                      </tr>);
                    })}</tbody>
                  </table></div>
                  <div style={{marginTop:"12px",fontSize:"11px",color:"#aaa"}}>Model: A(t) = Amax x (1 - exp(-k x t)) | Amax: max absorbance | k: rate constant | t1/2 = ln(2)/k | R2 &gt;= 0.95 = Good, &gt;= 0.85 = Moderate</div>
                </div>
              </>)}
            </>)}

            {modal&&(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={()=>setModal(null)}>
              <div style={{background:"#fff",borderRadius:"14px",padding:"24px 28px",maxWidth:modal.type==="image"?"740px":"400px",width:"92%",textAlign:"center",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}} onClick={(e)=>e.stopPropagation()}>
                {modal.type==="error"&&<><div style={{fontSize:"15px",fontWeight:700,color:"#b03030",marginBottom:"8px"}}>Error</div><div style={{fontSize:"13px",color:"#888",marginBottom:"16px"}}>{modal.msg}</div></>}
                {modal.type==="image"&&<>
                  <div style={{fontSize:"16px",fontWeight:700,color:"#5B4A8A",marginBottom:"6px"}}>Save as PNG</div>
                  <div style={{fontSize:"12px",color:"#888",marginBottom:"12px"}}>Right-click the image and choose "Save image as" to save as PNG.</div>
                  <img src={modal.url} alt="Chart" style={{width:"100%",borderRadius:"8px",border:"1px solid #EDE9F8",display:"block"}}/>
                </>}
                {modal.type==="download"&&<>
                  <div style={{fontSize:"16px",fontWeight:700,color:"#5B4A8A",marginBottom:"8px"}}>Download File</div>
                  <div style={{fontSize:"13px",color:"#888",marginBottom:"20px"}}>Click to save <b>{modal.filename}</b></div>
                  <a href={modal.url} download={modal.filename} style={{display:"inline-block",padding:"10px 24px",background:"#7C6FAF",color:"#fff",borderRadius:"8px",fontWeight:600,fontSize:"14px",textDecoration:"none",marginBottom:"12px"}}>Save {modal.filename}</a><br/>
                </>}
                <button style={Object.assign({},S.btn,S.btnS,{marginTop:"12px"})} onClick={()=>setModal(null)}>Close</button>
              </div>
            </div>)}
          </div>
        </div>
      );
    }

    // ── Mount ──────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
